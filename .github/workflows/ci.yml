name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Build and run the full suite across operating systems and compilers.
  # gcc and clang shake out different warnings and codegen; macOS exercises
  # the non-x86 JIT fallback and the BSD/clang toolchain. fail-fast is off so
  # one platform's failure doesn't hide the others' results.
  build-and-test:
    name: ${{ matrix.os }} / ${{ matrix.cc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cc: gcc
          - os: ubuntu-latest
            cc: clang
          - os: macos-latest
            cc: clang
    steps:
      - uses: actions/checkout@v4

      - name: Install compiler (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.cc }}

      - name: Build
        run: CC=${{ matrix.cc }} ./build.sh

      - name: Verify binary
        run: ./src/eigenscript --version

      - name: Run test suite
        run: cd tests && bash run_all_tests.sh

  # Build the http+model variant and run the suite against it: the suite's
  # probe-gated sections ([44]-[45] HTTP, [47] model roundtrip/overflow,
  # transformer smoke) silently skip on the minimal build, so without this
  # job ~5000 lines of extension C never execute in CI. Also compile-check
  # the gfx variant and the LSP (both bitrot invisibly otherwise — the LSP
  # had, for months) and run the standalone JIT emitter smoke tests.
  extensions:
    name: extensions (http+model suite; gfx/lsp/jit-smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: JIT emitter smoke tests
        run: make jit-smoke

      - name: Build http+model variant
        run: make http

      - name: Run full suite against http+model build
        run: cd tests && bash run_all_tests.sh

      - name: Compile-check gfx variant
        run: make gfx

      - name: Compile-check LSP
        run: make lsp

  # Run the entire suite under AddressSanitizer + UndefinedBehaviorSanitizer.
  # This is the net that catches use-after-free, buffer overflow, and UB that
  # the normal -O2 build silently tolerates (the kind of bug that passes every
  # functional test yet corrupts memory underneath). Per-iteration leak
  # regressions are covered separately by tests/test_leak_guard.sh.
  sanitizers:
    name: asan + ubsan (full suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build with AddressSanitizer + UBSan
        run: make asan

      - name: Run full suite under sanitizers
        env:
          # Leak detection is ON: the whole suite runs leak-clean since the
          # exit-time teardown + birth-ref adoption fixes, so any new leak —
          # per-iteration or shutdown — fails this job. Memory corruption
          # and undefined behavior must also be zero (halt_on_error).
          ASAN_OPTIONS: detect_leaks=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: cd tests && bash run_all_tests.sh
