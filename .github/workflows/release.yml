name: Release

# Two entry points:
#  - pushing a v* tag (the classic path), or
#  - workflow_dispatch, which creates the tag itself (version defaults to
#    the VERSION file) and then builds the release. The dispatch path
#    exists because tags can't always be pushed from every environment,
#    and a GITHUB_TOKEN-pushed tag would not retrigger this workflow —
#    so the dispatch run does the whole job end to end.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag and release (default: the VERSION file)"
        required: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ inputs.version }}"
            [ -z "$VER" ] && VER="$(cat VERSION)"
            echo "tag=v${VER#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag (dispatch only, idempotent)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists on origin — releasing it as-is"
          else
            git tag -a "$TAG" -m "EigenScript $TAG"
            git push origin "$TAG"
          fi

      - name: Install GCC
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build minimal binary
        run: |
          ./build.sh
          mv src/eigenscript eigenscript-linux-x86_64
          chmod +x eigenscript-linux-x86_64

      - name: Build full binary
        run: |
          sudo apt-get install -y libpq-dev
          ./build.sh full
          mv src/eigenscript eigenscript-full-linux-x86_64
          chmod +x eigenscript-full-linux-x86_64

      - name: Run tests
        run: |
          cp eigenscript-linux-x86_64 src/eigenscript
          cd tests && bash run_all_tests.sh

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: |
            eigenscript-linux-x86_64
            eigenscript-full-linux-x86_64
