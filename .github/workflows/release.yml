name: Release

# Two entry points:
#  - pushing a v* tag (the classic path), or
#  - workflow_dispatch, which creates the tag itself (version defaults to
#    the VERSION file) and then builds the release. The dispatch path
#    exists because tags can't always be pushed from every environment,
#    and a GITHUB_TOKEN-pushed tag would not retrigger this workflow —
#    so the dispatch run does the whole job end to end.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag and release (default: the VERSION file)"
        required: false

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VER="${{ inputs.version }}"
            [ -z "$VER" ] && VER="$(cat VERSION)"
            echo "tag=v${VER#v}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag (dispatch only, idempotent)
        if: github.event_name == 'workflow_dispatch'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag $TAG already exists on origin — releasing it as-is"
          else
            git tag -a "$TAG" -m "EigenScript $TAG"
            git push origin "$TAG"
          fi

  # One leg per released platform. Linux additionally ships the `full`
  # variant (http+model+db); macOS ships the minimal build only — the
  # arm64 binary is interpreter-only until the ARM64 JIT exists. Every
  # leg runs the entire suite against the exact binary it uploads.
  # macos-15-intel is GitHub's hosted Intel runner (the macos-13
  # replacement); macos-latest is Apple Silicon.
  build:
    name: build (${{ matrix.label }})
    needs: tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: macos-15-intel
            label: macos-x86_64
          - os: macos-latest
            label: macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.tag.outputs.tag }}

      - name: Install GCC (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build minimal binary
        run: |
          ./build.sh
          cp src/eigenscript eigenscript-${{ matrix.label }}
          chmod +x eigenscript-${{ matrix.label }}

      - name: Build full binary (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y libpq-dev
          ./build.sh full
          mv src/eigenscript eigenscript-full-${{ matrix.label }}
          chmod +x eigenscript-full-${{ matrix.label }}

      - name: Run tests against the release binary
        run: |
          cp eigenscript-${{ matrix.label }} src/eigenscript
          cd tests && bash run_all_tests.sh

      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.label }}
          path: eigenscript-*${{ matrix.label }}
          if-no-files-found: error

  release:
    needs: [tag, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          merge-multiple: true

      # Verifiable with `sha256sum -c CHECKSUMS` (Linux) or
      # `shasum -a 256 -c CHECKSUMS` (macOS).
      - name: Generate CHECKSUMS
        run: |
          sha256sum eigenscript-* > CHECKSUMS
          cat CHECKSUMS

      - name: Upload binaries to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          files: |
            eigenscript-*
            CHECKSUMS
