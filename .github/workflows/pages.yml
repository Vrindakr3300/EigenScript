# Publish docs/ as a GitHub Pages site (stable URLs for every document,
# per the AI-legibility playbook). configure-pages provisions the Pages
# site on first run (enablement: true), so no manual settings step is
# needed — but note GitHub Pages requires the repository to be public
# (or a paid plan for private repos).
name: Docs site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "web/**"
      - "src/**"
      - "VERSION"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74
          actions-cache-folder: emsdk-cache
      - name: Build WASM playground
        run: bash web/build.sh
      - name: Stage playground under _site/playground
        run: |
          mkdir -p _site/playground
          cp -v web/dist/* _site/playground/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
