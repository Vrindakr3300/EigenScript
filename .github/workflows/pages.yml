# Publish docs/ as a GitHub Pages site (stable URLs for every document,
# per the AI-legibility playbook). configure-pages provisions the Pages
# site on first run (enablement: true), so no manual settings step is
# needed — but note GitHub Pages requires the repository to be public
# (or a paid plan for private repos).
name: Docs site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "web/**"
      - "src/**"
      - "VERSION"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5.0.0
        with:
          enablement: true
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697  # v1.0.13
        with:
          source: ./docs
          destination: ./_site
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@6ab9eb1bda2574c4ddb79809fc9247783eaf9021  # v14
        with:
          version: 3.1.74
          actions-cache-folder: emsdk-cache
      - name: Build WASM playground
        run: bash web/build.sh
      - name: Stage playground under _site/playground
        run: |
          sudo mkdir -p _site/playground
          sudo cp -v web/dist/* _site/playground/
          sudo chown -R "$(id -u):$(id -g)" _site/playground
      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3.0.1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
