# Publish docs/ as a GitHub Pages site (stable URLs for every document,
# per the AI-legibility playbook). configure-pages provisions the Pages
# site on first run (enablement: true), so no manual settings step is
# needed — but note GitHub Pages requires the repository to be public
# (or a paid plan for private repos).
name: Docs site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "web/**"
      - "src/**"
      - "VERSION"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
        with:
          enablement: true
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697  # v1.0.13
        with:
          source: ./docs
          destination: ./_site
      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@4528d102f7230f0e7b276855c01ea1159be0e984  # v16
        with:
          version: 3.1.74
          actions-cache-folder: emsdk-cache
      - name: Build WASM playground
        run: bash web/build.sh
      - name: Stage playground under _site/playground
        run: |
          sudo mkdir -p _site/playground
          sudo cp -v web/dist/* _site/playground/
          sudo chown -R "$(id -u):$(id -g)" _site/playground
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
